spring:
  application:
    name: achievement-calc-platform

  datasource:
    url: jdbc:mysql://localhost:3306/achievement_calc?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.course.achievement.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-executor-type: reuse

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.course.achievement: DEBUG
